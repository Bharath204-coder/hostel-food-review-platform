spring:
  application:
    name: menu-service

  datasource:
    url: jdbc:postgresql://localhost:5433/menu_db
    username: menuuser
    password: menupass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

server:
  port: 8082